<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - Sunday Morning Repair</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0b1120;color:#e5e7eb;margin:0}
header{background:#020617;padding:20px;text-align:center;border-bottom:2px solid #1e293b}
header img{height:70px;margin-bottom:10px}
header h1{margin:5px 0;color:#38bdf8;font-size:30px}
nav{margin-top:8px;display:flex;justify-content:center;flex-wrap:wrap}
nav a{color:#cbd5f5;margin:5px 15px;text-decoration:none;font-size:14px}
.container{max-width:1000px;margin:auto;padding:30px}
.card{background:#020617;padding:25px;border-radius:10px;border:1px solid #1e293b;margin-bottom:20px}
label{font-weight:bold;margin-top:10px;display:block}
select,input{width:100%;padding:10px;margin-top:5px;margin-bottom:10px;background:#0f172a;border:1px solid #334155;color:white;border-radius:5px}
.checkbox-group{margin-top:10px}
.totalBox{background:#020617;padding:20px;text-align:center;border-radius:10px;border:2px solid #38bdf8}
button.checkout{width:100%;padding:15px;font-size:18px;background:#0070ba;border:none;border-radius:6px;color:white;cursor:pointer;margin-top:15px}
button.checkout:hover{background:#005ea6}
@media(max-width:768px){nav{flex-direction:column}.container{padding:15px}button{width:100%}}

.main-header{
  background:#020617;
  padding:50px 20px;
  border-bottom:2px solid #1e293b;
}

/* Top row with logo and title */
.header-top{
  position:relative;
  text-align:center;
  padding-bottom:40px;  /* space between title and nav */
}

.header-top h1{
  margin:0;
  font-size:40px;
  color:#38bdf8;
}

/* Logo positioned on the left */
.logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  height:160px;
  width:auto;
}

/* Navigation */
.main-nav{
  display:block;
  margin-top:10px; /* space below title */
  text-align:center;
}

.main-nav a{
  color:#cbd5f5;
  text-decoration:none;
  margin:0 15px;  /* horizontal spacing between links */
  font-size:20px;
}

.main-nav a:hover{
  color:#38bdf8;
}
</style>
<script>
// --- CONFIG ---
const ORDER_WEBHOOK="https://script.google.com/macros/s/AKfycbzMkgV14VMMTaHgPoJ_AHpCm-bgHX38sJ4_n8TEHCDm99sytdKwtr8NVUAcRAN96mvf/exec";
const STRIPE_CHECKOUT_LINK="PASTE_STRIPE_LINK";

// --- UTILITY FUNCTIONS ---
function generateOrderID(){
	return 'SMR-'+Math.floor(10000 + Math.random()*90000)
}

function updatePrice(){
  let total=parseInt(document.getElementById("install").value);
  total+=parseInt(document.getElementById("sdcard").value);
  if(document.getElementById("protector").checked) total+=15;
  if(document.getElementById("thermal").checked) total+=15;
  if(document.getElementById("rush").checked) total+=40;
  document.getElementById("totalPrice").innerHTML="$"+total;
  document.getElementById("paypalAmount").value=total;
}

// --- SAVE ORDER ---
function saveOrder(event){
	event.preventDefault(); // prevent default form submit
	
  // Gather selected extras
  let extras = [];
  if(document.getElementById("protector").checked) extras.push("Screen Protector");
  if(document.getElementById("thermal").checked) extras.push("Premium Thermal Paste");
  if(document.getElementById("rush").checked) extras.push("Rush 24hr Service");

  let data = {
    order: document.getElementById("orderid").value,
    name: document.getElementById("custname").value,
    email: document.getElementById("custemail").value,
    phone: document.getElementById("custnumber").value,
    switchModel: document.getElementById("install").value,
    sdCard: document.getElementById("sdcard").value,
    extras: extras.join(", "),  // Combine all extras into a string
    total: document.getElementById("paypalAmount").value,
    status: "Awaiting Console",
    date: new Date().toLocaleString()
  };
  
  // Debug: log phone number
  console.log("Sending phone:", data.phone);
  
  // Send to Google Sheet webhook
  fetch(ORDER_WEBHOOK,{
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body:JSON.stringify(data)
  }).then(res=>res.text()).then(res=>{
    console.log("Webhook response:", res);
    alert("Order submitted! ID: "+data.order);
    document.getElementById("paypalForm").submit(); // now submit PayPal form
  }).catch(err=>{
    console.error(err);
    alert("Error submitting order. Check console.");
  });
}

// --- INIT ---
window.onload=function(){
	document.getElementById("orderid").value=generateOrderID();
	updatePrice();
}
</script>
</head>
<body>
<header class="main-header">
  <div class="header-top">
    <img src="images/sm repair logo test - 2.png" alt="Logo" class="logo">
    <h1>Sunday Morning Repair</h1>
  </div>

  <nav>
    <a href="index.html">Home</a> |
    <a href="order.html">Order</a> |
    <a href="services.html">Services</a> |
    <a href="mailin.html">Mail-In Guide</a> |
    <a href="store.html">Store</a> |
    <a href="tracking.html">Tracking</a> |
    <a href="faq.html">FAQ</a> |
    <a href="SMR - Admin Portal 2.html">Admin</a> |
  </nav>
</header>

<div class="container">
<section class="card">
<form target="paypal" action="https://www.paypal.com/cgi-bin/webscr" method="post" onsubmit="saveOrder()">
<input type="hidden" name="cmd" value="_cart">
<input type="hidden" name="add" value="1">
<input type="hidden" name="business" value="andrewpoe04@gmail.com">
<input type="hidden" name="currency_code" value="USD">
<input type="hidden" id="paypalAmount" name="amount" value="160">

<label>Order ID</label>
<input id="orderid" readonly>

<label>Name</label>
<input id="custname" required>

<label>Email</label>
<input id="custemail" type="email" required>

<label>Phone Number</label>
<input id="custnumber" name="phone" type="tel" required>

<label>Switch Model</label>
<select id="install" name="switchModel" onchange="updatePrice()" required>
<option value="160">V1 / V2 Switch - $160</option>
<option value="180">OLED Install - $180</option>
<option value="170">Lite Install - $170</option>
</select>

<label>SD Card Upgrade</label>
<select id="sdcard" onchange="updatePrice()">
<option value="0">No SD Card</option>
<option value="20">128GB (+$20)</option>
<option value="35">256GB (+$35)</option>
<option value="70">512GB (+$70)</option>
<option value="120">1TB (+$120)</option>
</select>

<div class="checkbox-group">
<input type="checkbox" id="protector" onchange="updatePrice()"> Screen Protector (+$15)<br>
<input type="checkbox" id="thermal" onchange="updatePrice()"> Premium Thermal Paste (+$15)<br>
<input type="checkbox" id="rush" onchange="updatePrice()"> Rush 24hr Service (+$40)
</div>

<div class="totalBox">
<h2>Total: <span id="totalPrice">$160</span></h2>
<button class="checkout" type="submit">Checkout with PayPal</button>
<button type="button" class="checkout" onclick="window.location.href=STRIPE_CHECKOUT_LINK">Pay with Card</button>
</div>
</form>
</section>
</div>

<footer>
Sunday Morning Repair © 2026
</footer>
</body>
</html>
