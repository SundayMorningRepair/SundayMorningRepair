<script>
async function lookupOrder() {
  const id = document.getElementById("portalOrder").value.trim();
  const output = document.getElementById("portalResult");

  // Replace with your published Google Sheet URL
  const sheetURL = "https://docs.google.com/spreadsheets/d/gviz/tq?tqx=out:json&gid=0";

  try {
    const res = await fetch(sheetURL);
    let text = await res.text();

    // Remove Google wrapper
    text = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
    const data = JSON.parse(text);

    // Google Sheets stores rows in data.table.rows
    const orders = data.table.rows.map(row => {
      return {
        OrderID: row.c[0] ? row.c[0].v : "",
        Customer: row.c[1] ? row.c[1].v : "",
        Status: row.c[2] ? row.c[2].v : "",
        Date: row.c[3] ? row.c[3].v : ""
      };
    });

    const result = orders.find(o => o.OrderID === id);

    if (result) {
      output.innerHTML = `<strong>Order ID:</strong> ${result.OrderID}<br>
                          <strong>Customer:</strong> ${result.Customer}<br>
                          <strong>Status:</strong> ${result.Status}<br>
                          <strong>Date:</strong> ${result.Date}`;
    } else {
      output.innerHTML = "<strong>No order found with that ID.</strong>";
    }

  } catch (err) {
    console.error(err);
    output.innerHTML = "<strong>Error fetching order data.</strong>";
  }
}
</script>
