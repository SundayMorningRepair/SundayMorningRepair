<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ===== PAGE SETUP ===== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sunday Morning Repair</title>

  <!-- ===== STYLES ===== -->
  <link rel="stylesheet" href="css/stylesheet.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- ===== HEADER PLACEHOLDER ===== -->
  <div id="header"></div>

  <!-- ===== LOGIN / SIGNUP FORM ===== -->
  <main class="login-page">
    <div class="container">
      <h2 id="formTitle">Login</h2>

      <!-- ===== SIGNUP-ONLY FIELDS ===== -->
      <div id="signupFields" style="display: none;">
        <input type="text" id="firstName" placeholder="First Name" autocomplete="given-name">
        <input type="text" id="lastName" placeholder="Last Name" autocomplete="family-name">
        <input type="tel" id="phone" placeholder="Phone Number (123-456-7890)" maxlength="12">
      </div>

      <!-- ===== SHARED LOGIN / SIGNUP FIELDS ===== -->
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">

      <!-- ===== ACTION BUTTONS ===== -->
      <button class="auth-button" onclick="handleAuth()">Login</button>

      <div class="toggle" onclick="toggleMode()">
        Don't have an account? Create Account
      </div>

      <p id="status"></p>
    </div>
  </main>

  <!-- ===== FOOTER PLACEHOLDER ===== -->
  <div id="footer"></div>

  <!-- ===== FIREBASE LIBRARIES ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- ===== FIREBASE CONFIG ===== -->
  <script src="firebase.js"></script>

  <!-- ===== LOAD HEADER / FOOTER ===== -->
  <script>
    fetch("HTML Links Head - Footer/header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;

        const script = document.createElement("script");
        script.src = "auth.js";
        document.body.appendChild(script);
      });

    fetch("HTML Links Head - Footer/footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <!-- ===== LOGIN / SIGNUP LOGIC ===== -->
  <script>
    let isLogin = true;

    // ===== TOGGLE BETWEEN LOGIN AND SIGNUP =====
    function toggleMode() {
      isLogin = !isLogin;

      document.getElementById("formTitle").innerText = isLogin ? "Login" : "Create Account";
      document.querySelector(".auth-button").innerText = isLogin ? "Login" : "Create Account";
      document.querySelector(".toggle").innerText = isLogin
        ? "Don't have an account? Create Account"
        : "Already have an account? Login";

      document.getElementById("signupFields").style.display = isLogin ? "none" : "block";

      setStatus("");
    }

    // ===== HANDLE LOGIN OR ACCOUNT CREATION =====
    function handleAuth() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!email || !password) {
        setStatus("Please enter your email and password.");
        return;
      }

      if (!isLogin) {
        if (!firstName || !lastName || !phone) {
          setStatus("Please fill out your first name, last name, and phone number.");
          return;
        }

        if (password.length < 6) {
          setStatus("Password must be at least 6 characters.");
          return;
        }

        const phoneRegex = /^\d{3}-\d{3}-\d{4}$/;
        if (!phoneRegex.test(phone)) {
          setStatus("Please enter a valid phone number in the format 123-456-7890.");
          return;
        }
      }

      setStatus(isLogin ? "Logging in..." : "Creating account...");

      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .then(async () => {
          if (isLogin) {
            await auth.signInWithEmailAndPassword(email, password);
          } else {
            const cred = await auth.createUserWithEmailAndPassword(email, password);

            await db.collection("users").doc(cred.user.uid).set({
              uid: cred.user.uid,
              email: cred.user.email || email,
              firstName: firstName,
              lastName: lastName,
              fullName: `${firstName} ${lastName}`.trim(),
              phone: phone.replace(/\D/g, ""),
              address1: "",
              address2: "",
              city: "",
              state: "",
              zip: "",
              contactPreference: "email",
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          }
        })
        .then(() => {
          const redirect = sessionStorage.getItem("redirectAfterLogin");

          if (redirect) {
            sessionStorage.removeItem("redirectAfterLogin");
            window.location.href = redirect;
          } else {
            window.location.href = isLogin ? "index.html" : "account.html";
          }
        })
        .catch((err) => {
          console.error("Auth error:", err);
          setStatus(err.message);
        });
    }

    // ===== STATUS MESSAGE HELPER =====
    function setStatus(msg) {
      document.getElementById("status").innerText = msg;
    }

    // ===== ENTER KEY SUBMIT =====
    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        handleAuth();
      }
    });

    // ===== PHONE NUMBER AUTO-FORMAT =====
    document.addEventListener("DOMContentLoaded", () => {
      const phoneInput = document.getElementById("phone");

      if (!phoneInput) return;

      phoneInput.addEventListener("input", (e) => {
        let value = e.target.value.replace(/\D/g, "");

        if (value.length > 10) {
          value = value.slice(0, 10);
        }

        if (value.length > 6) {
          value = value.replace(/(\d{3})(\d{3})(\d{4})/, "$1-$2-$3");
        } else if (value.length > 3) {
          value = value.replace(/(\d{3})(\d{1,3})/, "$1-$2");
        }

        e.target.value = value;
      });
    });
  </script>
</body>
</html>
