<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account System</title>

<style>
body {
  font-family: Arial;
  background: #0b1120;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #020617;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

#userInfo {
  margin-top: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>Sign Up</h2>
  <input type="email" id="signupEmail" placeholder="Email">
  <input type="password" id="signupPassword" placeholder="Password">
  <button onclick="signUp()">Create Account</button>

  <hr>

  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button onclick="login()">Login</button>

  <button onclick="logout()">Logout</button>

  <div id="userInfo"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// 🔑 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB281xI3xiXdvN8OKY5Qvg0IOT88eDVPzo",
  authDomain: "smr-repair-site.firebaseapp.com",
  projectId: "smr-repair-site",
  storageBucket: "smr-repair-site.firebasestorage.app",
  messagingSenderId: "416335849668",
  appId: "1:416335849668:web:c06f208b538f903247c191",
  measurementId: "G-6FTPNRJQ8J"
};



firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ SIGN UP
function signUp() {
  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPassword").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account created!"))
    .catch(err => alert(err.message));
}

// ✅ LOGIN
function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("Logged in!"))
    .catch(err => alert(err.message));
}

// ✅ LOGOUT
function logout() {
  auth.signOut();
}

// ✅ SHOW USER STATUS
auth.onAuthStateChanged(user => {
  const info = document.getElementById("userInfo");

  if (user) {
    info.innerHTML = `Logged in as:<br><b>${user.email}</b>`;
  } else {
    info.innerHTML = "Not logged in";
  }
});
</script>

</body>
</html>
